name: Teste

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Se descarca codul
      uses: actions/checkout@v4
    - name: Se descarca python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
    - name: Se descarca ce e necesar
      run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
    - name: Se ruleaza testele
      run: pytest
